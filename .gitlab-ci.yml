build-pdfs:
  rules:
    - changes:
        - markdown/**/*.md
        - filters/**/*.lua
        - preamble.tex
        - flake.nix
        - Makefile
        - templates/**/*
        - .gitlab-ci.yml
  image: nixos/nix:latest
  before_script:
    - echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf
    - echo "substituters = https://cache.nixos.org https://$CACHIX_CACHE.cachix.org" >> /etc/nix/nix.conf
    - echo "trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= $CACHIX_PUBLIC_KEY" >> /etc/nix/nix.conf
    - nix-env -iA nixpkgs.cachix
    - cachix authtoken $CACHIX_AUTH_TOKEN
  script:
    - nix build .#all-pdfs --out-link result-pdfs
    - cachix push $CACHIX_CACHE result-pdfs
  artifacts:
    paths:
      - result-pdfs/*.pdf
    when: on_success
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ] && [ "$CI_COMMIT_BRANCH" = "main" ]; then
        mkdir -p output
        cp result-pdfs/*.pdf output/
        git config user.name  "gitlab-ci-bot"
        git config user.email "gitlab-ci-bot@noreply.gitlab.com"
        git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git add output/*.pdf
        git diff --staged --quiet || git commit -m "ci: rebuild PDFs [skip ci]"
        git push origin main
      fi
