name: Build Resume PDF
on:
  push:
    branches: [main]
    paths:
      - 'resume.md'
      - 'example.md'
      - 'flake.nix'
      - 'preamble.tex'
      - 'Makefile'
      - 'filters/**.lua'
      - 'templates/**'
      - '.github/workflows/build.yml'
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/magic-nix-cache-action@v11
      - uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build PDFs
        run: nix build .#example-pdf --out-link result-example
      - name: Upload example PDF
        uses: actions/upload-artifact@v4
        with:
          name: example-pdf
          path: result-example/example.pdf
      - name: Commit built PDFs to repo
        if: github.ref == 'refs/heads/main'
        run: |
          cp result-example/example.pdf example.pdf
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add example.pdf
          git diff --staged --quiet || git commit -m "ci: rebuild PDFs [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
