name: Build Resume PDF

on:
  push:
    branches: [main]
    paths:
      - 'resume.md'
      - 'example.md'
      - 'filters/**.lua'
      - 'templates/**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build PDFs
        run: nix build .#resume-pdf .#example-pdf

      - name: Upload resume PDF
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: result-resume/resume.pdf

      - name: Upload example PDF
        uses: actions/upload-artifact@v4
        with:
          name: example-pdf
          path: result-example/example.pdf

      - name: Commit built PDFs to repo
        if: github.ref == 'refs/heads/main'
        run: |
          cp result-resume/resume.pdf resume.pdf
          cp result-example/example.pdf example.pdf
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf example.pdf
          git diff --staged --quiet || git commit -m "ci: rebuild PDFs [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
