name: Build PDFs
on:
  push:
    branches: [main]
    paths:
      - 'markdown/**.md'
      - 'filters/**.lua'
      - 'preamble.tex'
      - 'flake.nix'
      - 'Makefile'
      - 'templates/**'
      - '.github/workflows/build.yml'
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/magic-nix-cache-action@v11
      - uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build all PDFs
        run: nix build .#all-pdfs --out-link result-pdfs

      - name: Verify PDFs exist
        run: |
          for md in markdown/*.md; do
          base=$(basename "$md" .md)
          pdf="result-pdfs/${base}.pdf"
          [ -s "$pdf" ] || (echo "MISSING or empty: $pdf" && exit 1)
          done

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc
      - name: Build all HTMLs
        run: make html
      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: result-pdfs/*.pdf
          overwrite: true
      - name: Upload HTMLs
        uses: actions/upload-artifact@v4
        with:
          name: htmls
          path: output/*.html
          overwrite: true
      - name: Commit built PDFs to repo
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p output
          cp result-pdfs/*.pdf output/
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add output/*.pdf output/*.html
          git diff --staged --quiet || git commit -m "ci: rebuild PDFs [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
