name: Build PDFs
on:
  push:
    branches: [main]
    paths:
      - 'resume.md'
      - 'system-design.md'
      - 'preamble.tex'
      - 'flake.nix'
      - 'Makefile'
      - 'filters/**.lua'
      - 'templates/**'
      - '.github/workflows/build.yml'
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/magic-nix-cache-action@v11
      - uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build PDFs
        run: |
          nix build .#system-design-pdf --out-link result-system-design
          nix build .#resume-pdf        --out-link result-resume
      - name: Upload system-design PDF
        uses: actions/upload-artifact@v4
        with:
          name: system-design-pdf
          path: result-system-design/system-design.pdf
      - name: Upload resume PDF
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: result-resume/resume.pdf
      - name: Commit built PDFs to repo
        if: github.ref == 'refs/heads/main'
        run: |
          cp result-system-design/system-design.pdf system-design.pdf
          cp result-resume/resume.pdf resume.pdf
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add system-design.pdf resume.pdf
          git diff --staged --quiet || git commit -m "ci: rebuild PDFs [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
